global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    # WebSocket support
    timeout tunnel  3600s

# HTTP frontend - forward to proxy (no redirect)
frontend http-in
    bind :80
    mode http
    default_backend jupyter_proxy_backend

# HTTPS frontend - SSL termination at HAProxy
frontend https-in
    bind :443 ssl crt /etc/haproxy/certs/haproxy.pem
    mode http
    default_backend jupyter_proxy_backend

# Single backend: HAProxy connects to proxy over its internal SSL
backend jupyter_proxy_backend
    mode http
    option forwardfor
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-Proto http  if !{ ssl_fc }
    server proxy proxy:8443 ssl verify none
